<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档合并PDF工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.4.18/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        .drag-active { border-color: #2563eb !important; background-color: #eff6ff !important; }
        input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto px-4 py-10">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">📄 在线文档合并PDF工具</h1>
            <p class="text-gray-600">支持Word/PDF/图片 合并为一个PDF，本地处理，安全免费</p>
        </div>

        <div id="dropArea" class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center bg-white mb-6 cursor-pointer relative overflow-hidden">
            <p class="text-gray-600 mb-4">点击上传 或 拖拽文件到此处</p>
            <label class="bg-blue-600 text-white px-5 py-2 rounded-lg inline-block hover:bg-blue-700 pointer-events-none">选择文件</label>
            <input id="fileInput" type="file" multiple accept=".pdf,.docx,.jpg,.jpeg,.png,.webp">
            <p class="text-xs text-gray-500 mt-3">支持：docx、PDF、jpg、png、webp</p>
        </div>

        <div id="fileList" class="bg-white rounded-lg shadow-sm p-4 mb-6 hidden">
            <h3 class="font-semibold text-gray-700 mb-3">已选择文件</h3>
            <div id="fileItems" class="space-y-2"></div>
        </div>

        <div class="flex gap-3 justify-center mb-8">
            <button id="mergeBtn" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 disabled:bg-gray-300" disabled>开始合并为PDF</button>
            <button id="clearBtn" class="bg-red-500 px-5 py-2 rounded-lg hover:bg-red-600 text-white">清空文件</button>
        </div>

        <div id="progress" class="text-center text-blue-600 font-medium hidden">处理中，请稍候...</div>
        <div id="result" class="text-center text-green-600 font-medium hidden mt-4">
            ✅ 处理成功！<br>
            <button id="downloadBtn" class="mt-3 bg-blue-600 px-4 py-2 rounded-lg text-white hover:bg-blue-700">下载PDF</button>
        </div>
    </div>

<script>
const { PDFDocument } = PDFLib;
let fileList = [];
let finalPdf = null;

const dropArea = document.getElementById('dropArea');
const fileInput = document.getElementById('fileInput');
const fileListEl = document.getElementById('fileList');
const fileItemsEl = document.getElementById('fileItems');
const mergeBtn = document.getElementById('mergeBtn');
const clearBtn = document.getElementById('clearBtn');
const progress = document.getElementById('progress');
const result = document.getElementById('result');
const downloadBtn = document.getElementById('downloadBtn');

// 拖拽区域
['dragenter','dragover','dragleave','drop'].forEach(e=>{
  dropArea.addEventListener(e, ev=>ev.preventDefault());
});
dropArea.addEventListener('dragover', ()=>dropArea.classList.add('drag-active'));
dropArea.addEventListener('dragleave', ()=>dropArea.classList.remove('drag-active'));
dropArea.addEventListener('drop', e=>{
  dropArea.classList.remove('drag-active');
  handleFiles(e.dataTransfer.files);
});

// 文件选择（修复：一次点击生效）
fileInput.addEventListener('change', e=>handleFiles(e.target.files));

// 处理文件
function handleFiles(files){
  if(!files) return;
  let arr = Array.from(files);
  arr = arr.filter(f=>{
    let ext = f.name.split('.').pop().toLowerCase();
    return ['pdf','docx','jpg','jpeg','png','webp'].includes(ext);
  });
  fileList = [...fileList,...arr];
  renderList();
  mergeBtn.disabled = fileList.length===0;
}

// 渲染列表
function renderList(){
  if(fileList.length===0){
    fileListEl.classList.add('hidden');
    return;
  }
  fileListEl.classList.remove('hidden');
  fileItemsEl.innerHTML = '';
  fileList.forEach((f,i)=>{
    let d = document.createElement('div');
    d.className = 'flex justify-between items-center p-3 bg-gray-50 rounded border';
    d.innerHTML = `<span>${i+1}. ${f.name}</span><button data-i="${i}" class="text-red-500 text-sm">删除</button>`;
    fileItemsEl.appendChild(d);
  });
  document.querySelectorAll('[data-i]').forEach(b=>{
    b.onclick = ()=>{
      fileList.splice(b.dataset.i,1);
      renderList();
      mergeBtn.disabled = fileList.length===0;
    }
  });
}

// 清空
clearBtn.onclick = ()=>{
  fileList = [];
  fileInput.value = '';
  renderList();
  mergeBtn.disabled = true;
  progress.classList.add('hidden');
  result.classList.add('hidden');
}

// 合并核心
mergeBtn.onclick = async ()=>{
  mergeBtn.disabled = true;
  progress.classList.remove('hidden');
  result.classList.add('hidden');

  try {
    const pdfDoc = await PDFDocument.create();

    for(const file of fileList){
      const ext = file.name.split('.').pop().toLowerCase();
      const buf = await readFileBuf(file);

      if(ext === 'pdf'){
        const src = await PDFDocument.load(buf);
        const pages = await pdfDoc.copyPages(src, src.getPageIndices());
        pages.forEach(p=>pdfDoc.addPage(p));
      }
      else if(ext === 'docx'){
        await addWordDoc(buf, pdfDoc);
      }
      else if(['jpg','jpeg','png','webp'].includes(ext)){
        await addImage(buf, ext, pdfDoc);
      }
    }

    finalPdf = await pdfDoc.save();
    progress.classList.add('hidden');
    result.classList.remove('hidden');
  }catch(err){
    alert('处理失败：'+err.message);
    progress.classList.add('hidden');
    mergeBtn.disabled = false;
  }
}

// 读取文件
function readFileBuf(file){
  return new Promise((res,rej)=>{
    let r = new FileReader();
    r.onload = ()=>res(r.result);
    r.onerror = rej;
    r.readAsArrayBuffer(file);
  });
}

// Word 转换
async function addWordDoc(buffer, pdfDoc){
  const html = await mammoth.convertToHtml({ arrayBuffer: buffer });
  const el = document.createElement('div');
  el.innerHTML = html.value;
  el.style.cssText = 'position:absolute;left:-9999px;top:0;width:1000px;background:#fff;padding:20px';
  document.body.appendChild(el);

  const canvas = await html2canvas(el, { scale:1.5, useCORS:true, logging:false });
  document.body.removeChild(el);

  const imgData = canvas.toDataURL('image/jpeg',0.9);
  const imgBuf = await (await fetch(imgData)).arrayBuffer();
  const img = await pdfDoc.embedJpg(imgBuf);

  const page = pdfDoc.addPage([img.width, img.height]);
  page.drawImage(img, {x:0,y:0,width:img.width,height:img.height});
}

// 图片处理
async function addImage(buf, ext, pdfDoc){
  let img;
  if(ext === 'jpg' || ext === 'jpeg') img = await pdfDoc.embedJpg(buf);
  else img = await pdfDoc.embedPng(buf);
  const page = pdfDoc.addPage([img.width, img.height]);
  page.drawImage(img, {x:0,y:0,width:img.width,height:img.height});
}

// 下载
downloadBtn.onclick = ()=>{
  const blob = new Blob([finalPdf], {type:'application/pdf'});
  saveAs(blob, '文档合并_'+Date.now()+'.pdf');
}
</script>
</body>
</html>
