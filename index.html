<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文档合并为 PDF 前后端版</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <main class="wrap">
    <section class="hero card">
      <h1>文档合并为 PDF</h1>
      <p class="desc">
        前端负责上传与排序，后端负责把 PDF、图片、TXT、Markdown、DOC、DOCX 转成 PDF 后再合并。
        <strong>.doc 老式 Word 通过服务器端 LibreOffice 无界面转换，支持直接合并。</strong>
      </p>
      <div class="tags">
        <span>支持 .doc</span>
        <span>支持 .docx</span>
        <span>支持 PDF 与图片</span>
        <span>支持 TXT 与 Markdown</span>
      </div>
    </section>

    <section class="grid">
      <div class="card">
        <label class="dropzone" id="dropzone">
          <input id="fileInput" type="file" multiple accept=".pdf,.png,.jpg,.jpeg,.webp,.gif,.bmp,.tif,.tiff,.txt,.md,.doc,.docx" />
          <h2>拖拽文件到这里，或点击选择文件</h2>
          <p>上传后可通过上移、下移调整合并顺序。后台会严格按当前顺序合并。</p>
        </label>

        <div class="toolbar">
          <button id="chooseBtn" class="primary">选择文件</button>
          <button id="mergeBtn" class="secondary">上传并合并</button>
          <button id="clearBtn" class="ghost">清空列表</button>
          <button id="healthBtn" class="ghost">检查后端环境</button>
        </div>

        <pre id="status" class="status">等待添加文件。</pre>
      </div>

      <div class="card">
        <div class="panel-head">
          <h3>合并顺序</h3>
          <span id="summary">共 0 个文件</span>
        </div>
        <div id="list" class="file-list empty">当前还没有文件。</div>
      </div>
    </section>
  </main>

  <script>
    const state = { files: [] };

    const fileInput = document.getElementById('fileInput');
    const chooseBtn = document.getElementById('chooseBtn');
    const mergeBtn = document.getElementById('mergeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const healthBtn = document.getElementById('healthBtn');
    const dropzone = document.getElementById('dropzone');
    const list = document.getElementById('list');
    const summary = document.getElementById('summary');
    const statusEl = document.getElementById('status');

    chooseBtn.addEventListener('click', () => fileInput.click());
    clearBtn.addEventListener('click', clearFiles);
    mergeBtn.addEventListener('click', mergeFiles);
    healthBtn.addEventListener('click', checkHealth);
    fileInput.addEventListener('change', (e) => addFiles(e.target.files));

    ['dragenter', 'dragover'].forEach((eventName) => {
      dropzone.addEventListener(eventName, (e) => {
        e.preventDefault();
        e.stopPropagation();
        dropzone.classList.add('dragover');
      });
    });

    ['dragleave', 'drop'].forEach((eventName) => {
      dropzone.addEventListener(eventName, (e) => {
        e.preventDefault();
        e.stopPropagation();
        dropzone.classList.remove('dragover');
      });
    });

    dropzone.addEventListener('drop', (e) => addFiles(e.dataTransfer.files));

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.style.color = isError ? '#b91c1c' : '#475569';
    }

    function addFiles(fileListLike) {
      const files = Array.from(fileListLike || []);
      if (!files.length) return;
      state.files.push(...files);
      render();
      fileInput.value = '';
      setStatus(`已添加 ${files.length} 个文件。当前共 ${state.files.length} 个文件。`);
    }

    function clearFiles() {
      state.files = [];
      render();
      setStatus('已清空文件列表。');
    }

    function render() {
      summary.textContent = `共 ${state.files.length} 个文件`;
      if (!state.files.length) {
        list.className = 'file-list empty';
        list.innerHTML = '当前还没有文件。';
        return;
      }

      list.className = 'file-list';
      list.innerHTML = state.files.map((file, index) => `
        <div class="file-item">
          <div>
            <div class="file-name">${index + 1}. ${escapeHtml(file.name)}</div>
            <div class="file-meta">${escapeHtml(file.type || detectByName(file.name) || '未知类型')} · ${(file.size / 1024).toFixed(1)} KB</div>
          </div>
          <div class="actions">
            <button onclick="moveUp(${index})">上移</button>
            <button onclick="moveDown(${index})">下移</button>
            <button onclick="removeAt(${index})">删除</button>
          </div>
        </div>
      `).join('');
    }

    function detectByName(name) {
      const lower = String(name).toLowerCase();
      if (lower.endsWith('.doc')) return 'application/msword';
      if (lower.endsWith('.docx')) return 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
      if (lower.endsWith('.pdf')) return 'application/pdf';
      if (lower.endsWith('.txt')) return 'text/plain';
      if (lower.endsWith('.md')) return 'text/markdown';
      if (lower.match(/\.(png|jpg|jpeg|webp|gif|bmp|tif|tiff)$/)) return 'image/*';
      return '';
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>'"]/g, (c) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        "'": '&#39;',
        '"': '&quot;'
      }[c]));
    }

    window.moveUp = function(index) {
      if (index <= 0) return;
      [state.files[index - 1], state.files[index]] = [state.files[index], state.files[index - 1]];
      render();
    }

    window.moveDown = function(index) {
      if (index >= state.files.length - 1) return;
      [state.files[index], state.files[index + 1]] = [state.files[index + 1], state.files[index]];
      render();
    }

    window.removeAt = function(index) {
      state.files.splice(index, 1);
      render();
      setStatus(`已删除第 ${index + 1} 个文件。`);
    }

    async function mergeFiles() {
      if (!state.files.length) {
        setStatus('请先添加文件。', true);
        return;
      }

      mergeBtn.disabled = true;
      mergeBtn.textContent = '正在上传与合并...';
      setStatus('正在上传文件并请求服务器合并，请稍候...');

      try {
        const formData = new FormData();
        state.files.forEach((file) => formData.append('files', file, file.name));

        const response = await fetch('/api/merge', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.detail || `请求失败，状态码 ${response.status}`);
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'merged.pdf';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        setStatus('合并完成，PDF 已开始下载。');
      } catch (error) {
        console.error(error);
        setStatus(`合并失败：${error.message || error}`, true);
      } finally {
        mergeBtn.disabled = false;
        mergeBtn.textContent = '上传并合并';
      }
    }

    async function checkHealth() {
      try {
        const response = await fetch('/api/health');
        const data = await response.json();
        if (data.libreoffice_found) {
          setStatus(`后端环境正常。已检测到 LibreOffice：${data.soffice_path}`);
        } else {
          setStatus('后端已启动，但未检测到 LibreOffice。DOC 和 DOCX 转 PDF 会失败，请先安装 LibreOffice。', true);
        }
      } catch (error) {
        setStatus(`环境检查失败：${error.message || error}`, true);
      }
    }
  </script>
</body>
</html>
